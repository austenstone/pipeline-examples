name: Workflow Parameters

# Demonstrates workflow parameters and conditional execution
# Jenkins equivalent: parametersBooleanRecursivePromotion (parametersBooleanRecursivePromotion.groovy)

on:
  workflow_dispatch:
    inputs:
      simulate_promotion:
        description: 'Simulate the promotion'
        required: false
        type: boolean
        default: false
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
        default: 'dev'
      version:
        description: 'Version to deploy'
        required: false
        type: string
        default: '1.0.0'
      enable_notifications:
        description: 'Enable notifications'
        required: false
        type: boolean
        default: true
  push:
    paths:
      - '.github/workflows/workflow-parameters.yml'

jobs:
  conditional-execution:
    runs-on: ubuntu-latest
    # Only run when build number is odd (simulated with run_number)
    # Note: GitHub Actions doesn't support % operator, using contains as workaround
    if: contains(fromJSON('["1", "3", "5", "7", "9"]'), format('{0}', github.run_number)) || github.run_number > 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Display parameters
        run: |
          echo "🎯 Workflow Parameters:"
          echo "- Simulate Promotion: ${{ github.event.inputs.simulate_promotion || 'false' }}"
          echo "- Environment: ${{ github.event.inputs.environment || 'dev' }}"
          echo "- Version: ${{ github.event.inputs.version || '1.0.0' }}"
          echo "- Enable Notifications: ${{ github.event.inputs.enable_notifications || 'true' }}"
          echo "- Run Number: ${{ github.run_number }}"
          echo ""
          
          if [ "${{ github.run_number }}" -eq "1" ]; then
            echo "⚠️  This is the first run - no odd number check applies"
          else
            echo "✅ Run number ${{ github.run_number }} is odd - executing workflow"
          fi
      
      - name: Simulate promotion
        if: github.event.inputs.simulate_promotion == 'true'
        run: |
          echo "🚀 Simulating promotion..."
          echo "Would promote version ${{ github.event.inputs.version }} to ${{ github.event.inputs.environment }}"
          echo "✅ Promotion simulation complete"
      
      - name: Actual promotion
        if: github.event.inputs.simulate_promotion != 'true'
        run: |
          echo "🚀 Performing actual promotion..."
          echo "Deploying version ${{ github.event.inputs.version }} to ${{ github.event.inputs.environment }}"
          echo "✅ Promotion complete"
  
  environment-specific-job:
    runs-on: ubuntu-latest
    needs: conditional-execution
    if: always()
    
    steps:
      - name: Dev environment tasks
        if: github.event.inputs.environment == 'dev'
        run: |
          echo "🔧 Running dev-specific tasks..."
          echo "- Skip smoke tests"
          echo "- Enable debug logging"
      
      - name: Staging environment tasks
        if: github.event.inputs.environment == 'staging'
        run: |
          echo "🧪 Running staging-specific tasks..."
          echo "- Run smoke tests"
          echo "- Notify QA team"
      
      - name: Production environment tasks
        if: github.event.inputs.environment == 'production'
        run: |
          echo "🏭 Running production-specific tasks..."
          echo "- Run full test suite"
          echo "- Notify operations team"
          echo "- Create deployment ticket"
  
  recursive-workflow-call:
    runs-on: ubuntu-latest
    needs: environment-specific-job
    # Only trigger recursive call - simplified condition
    if: github.event.inputs.simulate_promotion == 'true'
    
    steps:
      - name: Trigger workflow again
        run: |
          echo "🔄 Would trigger this workflow again with same parameters:"
          echo "  simulate_promotion: ${{ github.event.inputs.simulate_promotion }}"
          echo "  environment: ${{ github.event.inputs.environment }}"
          echo "  version: ${{ github.event.inputs.version }}"
          echo ""
          echo "Using GitHub CLI:"
          echo "gh workflow run workflow-parameters.yml \\"
          echo "  -f simulate_promotion=${{ github.event.inputs.simulate_promotion }} \\"
          echo "  -f environment=${{ github.event.inputs.environment }} \\"
          echo "  -f version=${{ github.event.inputs.version }} \\"
          echo "  -f enable_notifications=${{ github.event.inputs.enable_notifications }}"
  
  notification-job:
    runs-on: ubuntu-latest
    needs: [conditional-execution, environment-specific-job, recursive-workflow-call]
    if: always() && github.event.inputs.enable_notifications == 'true'
    
    steps:
      - name: Send notification
        run: |
          echo "📧 Sending notifications..."
          echo ""
          echo "Workflow Status:"
          echo "- conditional-execution: ${{ needs.conditional-execution.result }}"
          echo "- environment-specific-job: ${{ needs.environment-specific-job.result }}"
          echo "- recursive-workflow-call: ${{ needs.recursive-workflow-call.result }}"
          echo ""
          echo "Parameters used:"
          echo "- Environment: ${{ github.event.inputs.environment }}"
          echo "- Version: ${{ github.event.inputs.version }}"
          echo "- Simulation: ${{ github.event.inputs.simulate_promotion }}"
          echo ""
          echo "✅ Notifications sent"
