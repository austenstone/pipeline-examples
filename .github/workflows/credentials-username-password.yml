name: Credentials Username Password

# Demonstrates secure credentials handling with GitHub Secrets
# Jenkins equivalent: credentialsUsernamePassword (credentialsUsernamePassword.groovy)

on:
  workflow_dispatch:  # Manual trigger for testing
  push:
    paths:
      - '.github/workflows/credentials-username-password.yml'

# Required secrets: FOO_CREDENTIALS_USR, FOO_CREDENTIALS_PSW
# Set via: gh secret set FOO_CREDENTIALS_USR --body "myusername"
#          gh secret set FOO_CREDENTIALS_PSW --body "mypassword"

jobs:
  credentials-demo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Use credentials (masked in logs)
        env:
          # GitHub automatically masks secret values in logs
          FOO_USR: ${{ secrets.FOO_CREDENTIALS_USR }}
          FOO_PSW: ${{ secrets.FOO_CREDENTIALS_PSW }}
          FOO: ${{ secrets.FOO_CREDENTIALS_USR }}:${{ secrets.FOO_CREDENTIALS_PSW }}
        run: |
          echo "🔐 Testing credentials handling..."
          
          # These will be masked as *** in the console output
          echo "FOO is $FOO"
          echo "FOO_USR is $FOO_USR"
          echo "FOO_PSW is $FOO_PSW"
          
          echo "✅ Credentials are automatically masked in GitHub Actions logs"
      
      - name: Write credentials to files
        env:
          FOO_USR: ${{ secrets.FOO_CREDENTIALS_USR }}
          FOO_PSW: ${{ secrets.FOO_CREDENTIALS_PSW }}
          FOO: ${{ secrets.FOO_CREDENTIALS_USR }}:${{ secrets.FOO_CREDENTIALS_PSW }}
        run: |
          echo "📝 Writing credentials to files..."
          
          mkdir -p combined
          echo "$FOO" > combined/foo.txt
          echo "$FOO_PSW" > foo_psw.txt
          echo "$FOO_USR" > foo_usr.txt
          
          echo "✅ Files created"
      
      - name: Archive credential files
        uses: actions/upload-artifact@v4
        with:
          name: credential-files
          path: |
            combined/*.txt
            foo_*.txt
          retention-days: 1  # Short retention for security
      
      - name: Verify artifacts created
        run: |
          echo "📋 Files created:"
          ls -la combined/*.txt foo_*.txt
