name: Maven Docker Build

# Demonstrates Maven build with Docker containers, parallel stages, and quality analysis
# Jenkins equivalent: mavenDocker (mavenDocker.groovy)

on:
  workflow_dispatch:  # Manual trigger for testing
  push:
    paths:
      - '.github/workflows/maven-docker.yml'
      - 'pom.xml'
  pull_request:
    paths:
      - 'pom.xml'

# Required secrets: SONAR_TOKEN, DOCKER_USERNAME, DOCKER_PASSWORD (if pushing to registry)

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Use Maven container for the build
    container:
      image: maven:3.9-eclipse-temurin-17
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: Build with Maven
        run: |
          echo "🔨 Building Maven project..."
          # Simulate Maven build (no actual pom.xml in this repo)
          echo "mvn clean package -DskipTests"
          echo "✅ Build completed"
          
          # Create a mock JAR file for demonstration
          mkdir -p target
          echo "Mock JAR content" > target/demo-1.0.0.jar
      
      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          echo "mvn test"
          echo "✅ Tests passed"
      
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-artifacts
          path: target/*.jar
          retention-days: 30
  
  quality-analysis:
    runs-on: ubuntu-latest
    needs: build
    
    strategy:
      matrix:
        analysis: [integration-test, sonar-scan]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Integration Tests
        if: matrix.analysis == 'integration-test'
        run: |
          echo "🧪 Running integration tests..."
          echo "mvn verify -P integration-tests"
          echo "✅ Integration tests completed"
      
      - name: Run SonarQube Scan
        if: matrix.analysis == 'sonar-scan'
        container:
          image: maven:3.9-eclipse-temurin-17
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "📊 Running SonarQube analysis..."
          if [ -z "$SONAR_TOKEN" ]; then
            echo "⚠️  SONAR_TOKEN not set - skipping actual scan"
            echo "Would run: mvn sonar:sonar -Dsonar.login=***"
          else
            echo "mvn sonar:sonar -Dsonar.login=***"
          fi
          echo "✅ SonarQube scan completed"
  
  build-and-publish-image:
    runs-on: ubuntu-latest
    needs: [build, quality-analysis]
    # Only run on master branch
    if: github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Maven artifacts
        uses: actions/download-artifact@v4
        with:
          name: maven-artifacts
          path: target/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Create demo Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM eclipse-temurin:17-jre-alpine
          WORKDIR /app
          COPY target/*.jar app.jar
          EXPOSE 8080
          ENTRYPOINT ["java", "-jar", "app.jar"]
          EOF
          echo "✅ Dockerfile created"
      
      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          IMAGE_NAME="demo-app"
          VERSION="1.0.0-${{ github.sha }}"
          
          docker build -t ${IMAGE_NAME}:${VERSION} .
          docker tag ${IMAGE_NAME}:${VERSION} ${IMAGE_NAME}:latest
          
          echo "✅ Image built: ${IMAGE_NAME}:${VERSION}"
      
      - name: Login to Docker Hub (if credentials available)
        if: secrets.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Push Docker image
        if: secrets.DOCKER_USERNAME != ''
        run: |
          echo "📤 Pushing Docker image..."
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/demo-app"
          VERSION="1.0.0-${{ github.sha }}"
          
          docker tag demo-app:latest ${IMAGE_NAME}:${VERSION}
          docker push ${IMAGE_NAME}:${VERSION}
          
          echo "✅ Image pushed to Docker Hub"
  
  notify:
    runs-on: ubuntu-latest
    needs: [build, quality-analysis, build-and-publish-image]
    if: failure()
    
    steps:
      - name: Send failure notification
        run: |
          echo "❌ Pipeline failed!"
          echo "Would send email notification to: team@example.com"
          echo "Build URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
